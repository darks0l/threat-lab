[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[profile.ci]
fuzz_runs = 1000

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
base-sepolia = "${BASE_SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
base-sepolian = { key = "${BASESCAN_API_KEY}" }
